version: '3.8'

services:
  mongodb:
    image: mongo:6.0-alpine
    container_name: football-net-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: football-net
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - football-network

  # Optional: Mongo Express for easy data viewing
  mongo-express:
    image: mongo-express:latest
    container_name: football-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-admin123}
      ME_CONFIG_MONGODB_URL: mongodb://admin:${MONGO_PASSWORD:-admin123}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD:-admin123}
    depends_on:
      - mongodb
    networks:
      - football-network

volumes:
  mongodb_data:
    driver: local

networks:
  football-network:
    driver: bridge
